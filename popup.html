<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    .header img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }
    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: #888;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 8px;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 8px;
      border: 1.5px solid #e5e5e5;
      cursor: pointer;
      transition: all 0.15s ease;
      background: #fff;
    }
    .option:hover {
      border-color: #c5c5c5;
    }
    .option.selected {
      border-color: #d97706;
      background: #fffbeb;
    }
    .option input[type="radio"] {
      display: none;
    }
    .radio-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .radio-dot::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: transparent;
      transition: background 0.15s;
    }
    .option.selected .radio-dot {
      border-color: #d97706;
    }
    .option.selected .radio-dot::after {
      background: #d97706;
    }
    .option-label {
      font-size: 13px;
      font-weight: 500;
    }
    kbd {
      display: inline-block;
      padding: 2px 6px;
      font-size: 11px;
      font-family: inherit;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      color: #555;
    }
    .option.selected kbd {
      background: #fef3c7;
      border-color: #f3d48b;
      color: #92400e;
    }
    .hint {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #e5e5e5;
      font-size: 12px;
      color: #888;
    }
    .hint kbd {
      background: #f0f0f0;
      border-color: #ddd;
      color: #555;
    }
    .toast {
      text-align: center;
      font-size: 12px;
      color: #16a34a;
      margin-top: 10px;
      height: 18px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="">
    <div class="header-text">
      <h1>Shift+Enter Sender</h1>
      <p>for claude.ai</p>
    </div>
  </div>
  <div class="section-label">送信キー</div>
  <label class="option" data-value="shift">
    <input type="radio" name="sendKey" value="shift">
    <span class="radio-dot"></span>
    <span class="option-label"><kbd>Shift</kbd> + <kbd>Enter</kbd></span>
  </label>
  <label class="option" data-value="cmd">
    <input type="radio" name="sendKey" value="cmd">
    <span class="radio-dot"></span>
    <span class="option-label"><kbd>Cmd</kbd> + <kbd>Enter</kbd></span>
  </label>
  <div class="hint">
    <kbd>Esc</kbd> で入力欄にフォーカス
  </div>
  <div class="toast" id="saved">保存しました</div>
  <script src="popup.js"></script>
</body>
</html>
