<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      padding: 12px 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #333;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
    }
    label {
      display: block;
      padding: 4px 0;
      cursor: pointer;
    }
    label:hover {
      color: #000;
    }
    input[type="radio"] {
      margin-right: 6px;
    }
    .saved {
      color: #16a34a;
      font-size: 12px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .saved.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h3>送信キー設定</h3>
  <label><input type="radio" name="sendKey" value="shift"> Shift+Enter</label>
  <label><input type="radio" name="sendKey" value="cmd"> Cmd+Enter</label>
  <div class="saved" id="saved">保存しました</div>
  <script src="popup.js"></script>
</body>
</html>
